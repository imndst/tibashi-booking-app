<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seat Lookup</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  label { display: block; margin-top: 10px; }
  input, button { padding: 5px; margin-top: 5px; }
  #result { margin-top: 20px; font-weight: bold; }
</style>
</head>
<body>

<h1>Seat Lookup by Global ID</h1>

<label>Enter Event ID:
  <input type="text" id="eventId" placeholder="e.g., 164898">
</label>
<button id="loadSeats">Load Seat Plan</button>

<label>Enter Global Seat ID:
  <input type="number" id="globalSeatId" placeholder="e.g., 7">
</label>
<button id="getSeat">Find Seat</button>

<div id="result"></div>

<script>
  const API_BASE = "https://bdcast.gishot.ir/api"; // change to your API base
  let seatPlan = [];

  // Fetch seat plan from API
  async function fetchSeatPlan(eventId) {
    const res = await fetch(`${API_BASE}/Seat/plan/${eventId}`);
    return res.json();
  }

  async function loadSeatPlan() {
    const eventId = document.getElementById('eventId').value.trim();
    if (!eventId) return alert('Enter an event ID');

    try {
      const data = await fetchSeatPlan(eventId);

      if (!data.status) return alert(data.message);

      // Flatten seat plan into global IDs
      let globalId = 0;
      seatPlan = [];
      const rows = data.result || [];

      rows.forEach((row, rowIndex) => {
        const seatCount = parseInt(row.seat_in_rows || 0, 10);
        for (let i = 0; i < seatCount; i++) {
          globalId++;
          seatPlan.push({
            globalId: globalId,
            rowNumber: row.row_title?.trim() || rowIndex + 1,
            seatNumber: i + 1
          });
        }
      });

      alert(`Seat plan loaded. Total seats: ${globalId}`);
    } catch (err) {
      console.error(err);
      alert('Failed to load seat plan');
    }
  }

  function findSeat() {
    const globalId = parseInt(document.getElementById('globalSeatId').value, 10);
    if (!globalId) return alert('Enter a valid global seat ID');
    if (!seatPlan.length) return alert('Load seat plan first');

    const seat = seatPlan.find(s => s.globalId === globalId);
    const resultDiv = document.getElementById('result');
    if (!seat) {
      resultDiv.textContent = `Global ID ${globalId} not found`;
    } else {
      resultDiv.textContent = `Global ID ${globalId} → Row: ${seat.rowNumber}, Seat: ${seat.seatNumber}`;
    }
  }

  document.getElementById('loadSeats').addEventListener('click', loadSeatPlan);
  document.getElementById('getSeat').addEventListener('click', findSeat);
</script>

</body>
</html>
