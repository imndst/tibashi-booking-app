<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سازنده منحنی تعاملی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        canvas {
            display: block;
            background-color: #1f2937;
            border-radius: 0.5rem;
            width: 100%;
            height: 400px;
            touch-action: none;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            text-align: center;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="container mx-auto p-6 bg-gray-800 rounded-2xl shadow-lg border border-gray-700 max-w-2xl">
        <h1 class="text-3xl font-bold text-center mb-6 text-gray-100">سازنده منحنی تعاملی</h1>
        <p class="text-center text-gray-400 mb-8">
            برای افزودن و کنترل چندین خط منحنی، از دکمه زیر استفاده کنید.
        </p>
        
        <div class="relative w-full h-96 mb-8">
            <canvas id="curveCanvas"></canvas>
        </div>
        
        <div class="flex flex-col sm:flex-row justify-center space-y-4 sm:space-y-0 sm:space-x-4 sm:space-x-reverse">
            <button id="addCurveBtn" class="bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-6 rounded-full transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-sky-400">
                افزودن خط جدید
            </button>
        </div>
    </div>

    <!-- Dynamic controls -->
    <div id="controlsContainer" class="absolute top-4 right-4 flex flex-col space-y-2"></div>

    <!-- Modal -->
    <div id="pointModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700 w-full max-w-sm transform transition-all duration-300 scale-95 opacity-0">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-100">جزئیات نقطه</h2>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-200 transition-colors duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="space-y-3 mb-6">
                <div>
                    <p class="text-sm text-gray-400">قیمت:</p>
                    <p id="modalPrice" class="text-lg font-semibold text-sky-400"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-400">ردیف:</p>
                    <p id="modalRow" class="text-lg font-semibold text-sky-400"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-400">صندلی:</p>
                    <p id="modalSeat" class="text-lg font-semibold text-sky-400"></p>
                </div>
            </div>
            <button id="addToCartBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-full transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-emerald-400">
                افزودن به سبد خرید
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('curveCanvas');
            const ctx = canvas.getContext('2d');
            const addCurveBtn = document.getElementById('addCurveBtn');
            const controlsContainer = document.getElementById('controlsContainer');

            const modal = document.getElementById('pointModal');
            const modalContent = modal.querySelector('div');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const modalPrice = document.getElementById('modalPrice');
            const modalRow = document.getElementById('modalRow');
            const modalSeat = document.getElementById('modalSeat');
            const addToCartBtn = document.getElementById('addToCartBtn');
            
            let curves = [];
            let curveIdCounter = 0;

            const circleRadius = 8;
            const clickRadius = 15;

            function drawCurves() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                curves.forEach(curve => {
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#38bdf8';
                    ctx.lineCap = 'round';
                    
                    const startX = curve.x;
                    const endX = curve.x + curve.width;
                    const baseY = canvas.height / 2;

                    const y1 = baseY + (curve.y1 * (canvas.height / 200));
                    const y2 = baseY + (curve.y2 * (canvas.height / 200));
                    
                    const p0 = { x: startX, y: baseY };
                    const p1 = { x: startX + (endX - startX) / 3, y: y1 };
                    const p2 = { x: startX + 2 * (endX - startX) / 3, y: y2 };
                    const p3 = { x: endX, y: baseY };

                    ctx.beginPath();
                    ctx.moveTo(p0.x, p0.y);
                    ctx.bezierCurveTo(p1.x, p1.y, p2.x, p2.y, p3.x, p3.y);
                    ctx.stroke();

                    if (curve.numCircles > 0) {
                        const tStep = curve.numCircles === 1 ? 0 : 1 / (curve.numCircles - 1);
                        curve.circles = [];

                        for (let i = 0; i < curve.numCircles; i++) {
                            const t = curve.numCircles === 1 ? 0.5 : i * tStep;
                            
                            const x = Math.pow(1 - t, 3) * p0.x + 3 * Math.pow(1 - t, 2) * t * p1.x + 3 * (1 - t) * Math.pow(t, 2) * p2.x + Math.pow(t, 3) * p3.x;
                            const y = Math.pow(1 - t, 3) * p0.y + 3 * Math.pow(1 - t, 2) * t * p1.y + 3 * (1 - t) * Math.pow(t, 2) * p2.y + Math.pow(t, 3) * p3.y;

                            curve.circles.push({
                                x: x,
                                y: y,
                                price: `$${(Math.random() * 50 + 20).toFixed(2)}`,
                                row: `A${Math.floor(i / 5) + 1}`,
                                seat: `S${(i % 5) + 1}`,
                                isAddedToCart: false
                            });

                            ctx.fillStyle = curve.circles[i].isAddedToCart ? '#10B981' : '#fde047';
                            ctx.beginPath();
                            ctx.arc(x, y, circleRadius, 0, 2 * Math.PI);
                            ctx.fill();
                        }
                    } else {
                        curve.circles = [];
                    }
                });
            }
            
            function addCurve() {
                const curveId = `curve-${curveIdCounter++}`;
                const newCurve = {
                    id: curveId,
                    y1: 0,
                    y2: 0,
                    numCircles: 0,
                    x: canvas.width * 0.1,
                    width: canvas.width * 0.8,
                    circles: []
                };
                curves.push(newCurve);
                
                const controlsDiv = document.createElement('div');
                controlsDiv.id = curveId;
                controlsDiv.className = "bg-gray-800 p-2 rounded-xl shadow-lg border border-gray-700 flex flex-col space-y-2 min-w-max";
                controlsDiv.innerHTML = `
                    <div class="flex items-center justify-between">
                        <p class="text-sm font-bold text-gray-200">خط ${curveIdCounter}</p>
                        <button class="remove-btn text-red-500 hover:text-red-400 font-bold transition-colors duration-200">
                            حذف
                        </button>
                    </div>
                    <div class="flex flex-row-reverse space-x-2 space-x-reverse">
                        <div class="flex items-center space-x-1 space-x-reverse">
                            <p class="text-xs text-gray-400 min-w-max">X:</p>
                            <input type="number" data-prop="x" value="${newCurve.x.toFixed(0)}" min="0" max="${canvas.width}" class="w-16 text-center bg-gray-900 text-sky-400 text-xs py-1 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-400">
                        </div>
                        <div class="flex items-center space-x-1 space-x-reverse">
                            <p class="text-xs text-gray-400 min-w-max">عرض:</p>
                            <input type="number" data-prop="width" value="${newCurve.width.toFixed(0)}" min="10" max="${canvas.width}" class="w-16 text-center bg-gray-900 text-sky-400 text-xs py-1 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-400">
                        </div>
                    </div>
                    <div class="flex flex-row-reverse space-x-2 space-x-reverse">
                        <div class="flex items-center space-x-1 space-x-reverse">
                            <p class="text-xs text-gray-400 min-w-max">Y1:</p>
                            <input type="number" data-prop="y1" value="${newCurve.y1}" min="-100" max="100" class="w-16 text-center bg-gray-900 text-sky-400 text-xs py-1 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-400">
                        </div>
                        <div class="flex items-center space-x-1 space-x-reverse">
                            <p class="text-xs text-gray-400 min-w-max">Y2:</p>
                            <input type="number" data-prop="y2" value="${newCurve.y2}" min="-100" max="100" class="w-16 text-center bg-gray-900 text-sky-400 text-xs py-1 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-400">
                        </div>
                    </div>
                    <div class="flex flex-row-reverse space-x-2 space-x-reverse">
                        <div class="flex items-center space-x-1 space-x-reverse">
                            <p class="text-xs text-gray-400 min-w-max">تعداد:</p>
                            <input type="number" data-prop="numCircles" value="${newCurve.numCircles}" min="0" max="100" class="w-16 text-center bg-gray-900 text-sky-400 text-xs py-1 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-400">
                        </div>
                    </div>
                `;
                controlsContainer.appendChild(controlsDiv);

                controlsDiv.querySelectorAll('input').forEach(input => {
                    input.addEventListener('input', (event) => {
                        const prop = event.target.dataset.prop;
                        newCurve[prop] = parseFloat(event.target.value);
                        drawCurves();
                    });
                });
                
                controlsDiv.querySelector('.remove-btn').addEventListener('click', () => {
                    controlsDiv.remove();
                    const index = curves.findIndex(c => c.id === curveId);
                    if (index > -1) {
                        curves.splice(index, 1);
                    }
                    drawCurves();
                });
                
                drawCurves();
            }

            function resizeCanvas() {
                const rect = canvas.parentNode.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                drawCurves();
            }

            canvas.addEventListener('mousemove', (event) => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = event.clientX - rect.left;
                const mouseY = event.clientY - rect.top;
                
                let isOverCircle = false;
                for (const curve of curves) {
                    for (const circle of curve.circles) {
                        const distance = Math.sqrt(Math.pow(mouseX - circle.x, 2) + Math.pow(mouseY - circle.y, 2));
                        if (distance <= clickRadius) {
                            isOverCircle = true;
                            break;
                        }
                    }
                    if (isOverCircle) break;
                }
                
                canvas.style.cursor = isOverCircle ? 'pointer' : 'default';
            });

            canvas.addEventListener('click', (event) => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = event.clientX - rect.left;
                const mouseY = event.clientY - rect.top;

                let clickedCircle = null;
                let clickedCurveId = null;

                for (const curve of curves) {
                    for (const circle of curve.circles) {
                        const distance = Math.sqrt(Math.pow(mouseX - circle.x, 2) + Math.pow(mouseY - circle.y, 2));
                        if (distance <= clickRadius) {
                            clickedCircle = circle;
                            clickedCurveId = curve.id;
                            break;
                        }
                    }
                    if (clickedCircle) break;
                }

                if (clickedCircle) {
                    modalPrice.textContent = clickedCircle.price;
                    modalRow.textContent = clickedCircle.row;
                    modalSeat.textContent = clickedCircle.seat;
                    modal.classList.remove('hidden');
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                    
                    addToCartBtn.onclick = () => {
                        const curve = curves.find(c => c.id === clickedCurveId);
                        if (curve) {
                            const circleToUpdate = curve.circles.find(c => c.x === clickedCircle.x && c.y === clickedCircle.y);
                            if (circleToUpdate) {
                                circleToUpdate.isAddedToCart = true;
                                drawCurves();
                            }
                        }
                        console.log(`افزودن به سبد خرید: قیمت: ${clickedCircle.price}, ردیف: ${clickedCircle.row}, صندلی: ${clickedCircle.seat}`);
                        closeModal();
                    };
                }
            });

            function closeModal() {
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }

            closeModalBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (event) => {
                if (event.target === modal) {
                    closeModal();
                }
            });

            addCurveBtn.addEventListener('click', addCurve);
            
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            addCurve();
        });
    </script>
</body>
</html>
