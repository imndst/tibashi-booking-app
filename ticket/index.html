<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./ticket.css">
<title>بلیط شما</title>
</head>
<body>

<div class="actions">
  <button id="downloadPDF">دانلود PDF</button>
</div>

<div id="tickets"></div>

<script src="https://new.gishot.ir/cnd/qrcode.min.js"></script>
<script src="https://new.gishot.ir/cnd/JsBarcode.all.min.js"></script>
<script src="https://new.gishot.ir/cnd/html2pdf.bundle.min.js"></script>
<script type="module">
import { renderTickets, downloadTicketsPDF } from './ticketRenderer.js';

// Read ticket number from query string
const params = new URLSearchParams(window.location.search);
const resNum = params.get("res"); // <-- use "res" instead of "Status"

console.log(resNum);

if (resNum) {
  renderTickets(resNum); // Pass the res number to renderTickets
} else {
  document.getElementById("tickets").innerHTML = "<p style='color:red'>❌ شماره پیگیری یافت نشد.</p>";
}

// PDF download button
document.getElementById("downloadPDF").addEventListener("click", downloadTicketsPDF);
</script>

</body>
</html>
